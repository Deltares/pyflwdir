name: Tests

on:
  push:
    branches: [main]
    paths:
      - tests/*
      - pyflwdir/*
      - pyproject.toml
      - pixi.lock
  pull_request:
    branches: [main]
    paths:
      - tests/*
      - pyflwdir/*
      - pyproject.toml
      - pixi.lock

jobs:
  build:
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["311", "312", "313", "314"]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.python-version }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.64.0
          environments: test-py${{ matrix.python-version }}
          locked: false
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      # run test
      - name: Test
        run: pixi run -e test-py${{ matrix.python-version }} test
